    <!-- JSON-LD: FAQPage -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "¿Cómo funciona el proceso de coaching?",
          "acceptedAnswer": { "@type": "Answer", "text": "Una vez contactes conmigo, tendremos una consulta inicial gratuita para conocer tus objetivos, historial y preferencias. A partir de ahí, diseño tu plan personalizado y empezamos el seguimiento semanal." }
        },
        {
          "@type": "Question",
          "name": "¿Necesito experiencia previa para empezar?",
          "acceptedAnswer": { "@type": "Answer", "text": "No. Trabajo con personas de todos los niveles, desde principiantes hasta atletas de competición. Cada plan se adapta 100% a tu nivel actual." }
        },
        {
          "@type": "Question",
          "name": "¿Cómo se realizan los check-ins semanales?",
          "acceptedAnswer": { "@type": "Answer", "text": "A través de la app de coaching, donde envías tus métricas, fotos de progreso y feedback. Yo reviso todo y ajusto tu plan semanalmente." }
        },
        {
          "@type": "Question",
          "name": "¿Puedo cambiar de plan después de empezar?",
          "acceptedAnswer": { "@type": "Answer", "text": "Sí, puedes cambiar o ampliar tu plan en cualquier momento. Muchos clientes empiezan con nutrición y luego añaden entrenamiento." }
        },
        {
          "@type": "Question",
          "name": "¿Qué incluye el seguimiento semanal?",
          "acceptedAnswer": { "@type": "Answer", "text": "Revisión de adherencia, ajuste de macros o volumen de entrenamiento, feedback sobre tu técnica y soporte continuo por chat para resolver dudas." }
        },
        {
          "@type": "Question",
          "name": "¿Es todo online o presencial?",
          "acceptedAnswer": { "@type": "Answer", "text": "El coaching es 100% online, lo que te permite seguir tu plan desde cualquier lugar. La comunicación es a través de la app y chat." }
        }
      ]
    }
    </script>
