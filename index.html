<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/assets/logo-jip.png" type="image/png" />
    <link rel="apple-touch-icon" href="/assets/logo-jip.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JIP Performance Nutrition — Coaching Deportivo, Nutrición y Entrenamiento</title>

    <meta name="author" content="Isla Cloud Solutions" />
    <meta name="keywords" content="coaching deportivo, nutrición deportiva, entrenamiento personal, plan nutricional, powerlifting, rendimiento deportivo, coach online" />

    <meta property="og:title" content="JIP Performance Nutrition — Coaching Deportivo y Nutrición" />
    <meta property="og:description" content="Transforma tu rendimiento con coaching personalizado de nutrición deportiva y entrenamiento. Planes adaptados por un entrenador certificado NSCA." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/assets/logo-jip.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="JIP Performance Nutrition — Coaching Deportivo" />
    <meta name="twitter:description" content="Coaching personalizado de nutrición deportiva y entrenamiento. Transforma tu rendimiento." />
    <meta name="twitter:image" content="/assets/logo-jip.png" />
    <link rel="canonical" href="https://jipcoaching.lovable.app/" />

    <meta name="developer" content="Isla Cloud Solutions — https://www.islacloudsolutions.com" />

    <!-- Geo & Language targeting for Spain -->
    <meta name="geo.region" content="ES" />
    <meta name="geo.placename" content="España" />
    <meta name="content-language" content="es" />
    <link rel="alternate" hreflang="es" href="https://jipcoaching.lovable.app/" />
    <link rel="alternate" hreflang="x-default" href="https://jipcoaching.lovable.app/" />

    <!-- JSON-LD: LocalBusiness + Service -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "LocalBusiness",
      "name": "JIP Performance Nutrition",
      "description": "Coaching personalizado de nutrición deportiva y entrenamiento. Planes adaptados a tus objetivos por un entrenador certificado NSCA.",
      "url": "https://jipcoaching.lovable.app",
      "image": "https://jipcoaching.lovable.app/assets/logo-jip.png",
      "priceRange": "€€",
      "address": {
        "@type": "PostalAddress",
        "addressCountry": "ES"
      },
      "areaServed": {
        "@type": "Country",
        "name": "ES"
      },
      "knowsLanguage": ["es", "en"],
      "hasOfferCatalog": {
        "@type": "OfferCatalog",
        "name": "Planes de Coaching",
        "itemListElement": [
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "Plan de Nutrición",
              "description": "Plan nutricional personalizado con seguimiento semanal y ajustes continuos."
            }
          },
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "Plan de Entrenamiento",
              "description": "Programa de entrenamiento periodizado y adaptado a tu nivel y equipamiento."
            }
          },
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "Nutrición + Entrenamiento",
              "description": "El paquete completo. Nutrición y entrenamiento diseñados para trabajar en sinergia."
            }
          }
        ]
      }
    }
    </script>

    <!-- JSON-LD: FAQPage -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "¿Cómo funciona el proceso de coaching?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Una vez contactes conmigo, tendremos una consulta inicial gratuita para conocer tus objetivos, historial y preferencias. A partir de ahí, diseño tu plan personalizado y empezamos el seguimiento semanal."
          }
        },
        {
          "@type": "Question",
          "name": "¿Necesito experiencia previa para empezar?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No. Trabajo con personas de todos los niveles, desde principiantes hasta atletas de competición. Cada plan se adapta 100% a tu nivel actual."
          }
        },
        {
          "@type": "Question",
          "name": "¿Cómo se realizan los check-ins semanales?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "A través de la app de coaching, donde envías tus métricas, fotos de progreso y feedback. Yo reviso todo y ajusto tu plan semanalmente."
          }
        },
        {
          "@type": "Question",
          "name": "¿Puedo cambiar de plan después de empezar?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Sí, puedes cambiar o ampliar tu plan en cualquier momento. Muchos clientes empiezan con nutrición y luego añaden entrenamiento."
          }
        },
        {
          "@type": "Question",
          "name": "¿Qué incluye el seguimiento semanal?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Revisión de adherencia, ajuste de macros o volumen de entrenamiento, feedback sobre tu técnica y soporte continuo por chat para resolver dudas."
          }
        },
        {
          "@type": "Question",
          "name": "¿Es todo online o presencial?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "El coaching es 100% online, lo que te permite seguir tu plan desde cualquier lugar. La comunicación es a través de la app y chat."
          }
        }
      ]
    }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
